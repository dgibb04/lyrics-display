<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Grace - Lyrics Display</title>
    <!-- Modular CSS imports -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <div class="lyrics-display">
            <h1>Amazing Grace</h1>
            <div class="progress-display" id="progressDisplay">
                Line <span id="currentLine">0</span> of <span id="totalLines">0</span>
            </div>
            <div class="lyric-container">
                <div class="line-number" id="lineNumber">1</div>
                <div class="lyric-line" id="lyricLine">
                    Loading lyrics...
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" class="btn" title="Previous (← or click)">Previous</button>
            <button id="playBtn" class="btn play-btn" title="Play / Pause (Spacebar)">Play</button>
            <button id="nextBtn" class="btn" title="Next (→ or click)">Next</button>
        </div>

        <div class="speed-control">
            <label for="speedSlider">Playback Speed:</label>
            <div class="speed-display">
                <span id="speedValue">1.0</span>x
            </div>
            <input
                type="range"
                id="speedSlider"
                min="0.25"
                max="2"
                step="0.25"
                value="1"
                title="Adjust playback speed (0.25x - 2x)"
            >
        </div>

        <div class="keyboard-hints">
            <span class="hint">Spacebar</span> Play/Pause •
            <span class="hint">←/→</span> Navigate
        </div>
    </div>

    <!-- Main application with ES6 modules -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
