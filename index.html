<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="lyrics-display">
            <h1>Amazing Grace</h1>
            <div class="progress-display" id="progressDisplay">
                Line <span id="currentLine">0</span> of <span id="totalLines">0</span>
            </div>
            <div class="lyric-container">
                <div class="line-number" id="lineNumber">1</div>
                <div class="lyric-line" id="lyricLine">
                    Loading lyrics...
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" class="btn">Previous</button>
            <button id="playBtn" class="btn play-btn">Play</button>
            <button id="nextBtn" class="btn">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
